{% extends "base.html" %}
{% block title %} - Files{% endblock %}
{% block content %}
<div class="row">
  <div class="col-lg-10 mx-auto">
    <div id="dropZone" class="border border-2 border-dashed rounded-3 p-5 text-center mb-4">
      <i class="bi bi-cloud-arrow-up fs-1 text-body-secondary"></i>
      <p class="mb-2">Drag & drop files here</p>
      <button id="pickFileBtn" class="btn btn-primary"><i class="bi bi-folder-plus"></i> Choose Files</button>
      <input type="file" id="fileInput" multiple hidden>
      <div id="uploadProgress" class="mt-3 d-none">
        <div class="progress">
          <div class="progress-bar" role="progressbar" style="width: 0%"></div>
        </div>
      </div>
    </div>

    <div class="d-flex align-items-center mb-3 gap-2">
      <input type="search" id="fileSearch" class="form-control" placeholder="Search files...">
    </div>

    <div class="table-responsive">
      <table class="table align-middle">
        <thead>
          <tr>
            <th>Name</th>
            <th>Size</th>
            <th>Uploaded by</th>
            <th>Uploaded</th>
            <th>Downloads</th>
            <th class="text-end">Actions</th>
          </tr>
        </thead>
        <tbody id="filesTableBody"></tbody>
      </table>
    </div>
    <div id="filesEmpty" class="text-center text-body-secondary py-5 d-none">
      <i class="bi bi-folder-x fs-1"></i>
      <p>No files uploaded yet.</p>
    </div>
  </div>
</div>

<template id="fileRowTemplate">
  <tr>
    <td>
      <a href="#" class="file-name-link text-decoration-none"></a>
    </td>
    <td class="file-size text-body-secondary"></td>
    <td class="file-uploader text-body-secondary"></td>
    <td class="file-uploaded-at text-body-secondary"></td>
    <td class="file-download-count text-body-secondary"></td>
    <td class="text-end">
      <div class="btn-group btn-group-sm">
        <button class="btn btn-outline-secondary download-btn" title="Download"><i class="bi bi-download"></i></button>
        <button class="btn btn-outline-secondary copy-link-btn" title="Copy Link"><i class="bi bi-link-45deg"></i></button>
        <button class="btn btn-outline-secondary rename-btn" title="Rename"><i class="bi bi-pencil"></i></button>
        <button class="btn btn-outline-danger delete-btn" title="Delete"><i class="bi bi-trash"></i></button>
      </div>
    </td>
  </tr>
</template>

<!-- Preview modal -->
<div class="modal fade" id="previewModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="previewModalTitle">Preview</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body text-center" id="previewModalBody"></div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/files.js') }}"></script>
{% endblock %}
